{% extends "base.html" %}
{% block title %}Вход — PizzaHouse{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card mt-4">
      <div class="card-header bg-danger text-white text-center">
        <h4 class="mb-0">Вход в аккаунт</h4>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-danger w-100">Войти</button>
        </form>
        <hr>
        <p class="text-center mb-0">Нет аккаунта? <a href="/users/register/">Зарегистрироваться</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pizzahouse
      POSTGRES_USER: pizzauser
      POSTGRES_PASSWORD: pizzapass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pizzauser -d pizzahouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://pizzauser:pizzapass@db:5432/pizzahouse
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
